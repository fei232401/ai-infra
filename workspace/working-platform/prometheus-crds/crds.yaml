---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servicemonitors.monitoring.coreos.com
spec:
  group: monitoring.coreos.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: ["selector", "endpoints"]
            properties:
              selector:
                type: object
                properties:
                  matchLabels:
                    type: object
                    additionalProperties:
                      type: string
              endpoints:
                type: array
                items:
                  type: object
                  required: ["port"]
                  properties:
                    port:
                      type: string
                    path:
                      type: string
                    interval:
                      type: string
  scope: Namespaced
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: prometheusrules.monitoring.coreos.com
spec:
  group: monitoring.coreos.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: ["groups"]
            properties:
              groups:
                type: array
                items:
                  type: object
                  required: ["name", "rules"]
                  properties:
                    name:
                      type: string
                    rules:
                      type: array
                      items:
                        type: object
                        required: ["alert", "expr"]
                        properties:
                          alert:
                            type: string
                          expr:
                            type: string
                          for:
                            type: string
                          labels:
                            type: object
                            additionalProperties:
                              type: string
                          annotations:
                            type: object
                            additionalProperties:
                              type: string
  scope: Namespaced
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: alertmanagerconfigs.monitoring.coreos.com
spec:
  group: monitoring.coreos.com
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              route:
                type: object
              receivers:
                type: array
                items:
                  type: object
  scope: Namespaced
