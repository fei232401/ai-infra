apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # 确保先于 monitoring-app 同步
spec:
  project: default
  source:
    repoURL: git@github.com:fei232401/ai-infra.git
    targetRevision: main
    path: workspace/working-platform/prometheus-crds
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring  # CRD 是集群范围，namespace 无关紧要，但写 monitoring 便于管理
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true  # CRD 必须用服务器端应用，否则可能因字段冲突失败
