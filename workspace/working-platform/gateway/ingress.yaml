---
# Grafana
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gw-grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: gateway
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - http:
      paths:
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: monitoring-stack-grafana
            port:
              number: 80
---
# Prometheus
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gw-prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: gateway
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - http:
      paths:
      - path: /prometheus
        pathType: Prefix
        backend:
          service:
            name: monitoring-stack-kube-prom-prometheus
            port:
              number: 9090
---
# Open-WebUI
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gw-openwebui
  namespace: ai-platform
  labels:
    app.kubernetes.io/part-of: gateway
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - http:
      paths:
      - path: /openwebui
        pathType: Prefix
        backend:
          service:
            name: open-webui-service
            port:
              number: 8080
