apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-infra-gateway
  namespace: ai-platform
  labels:
    app: ai-infra-gateway
    release: monitoring-stack
spec:
  selector:
    matchLabels:
      app: ai-infra-gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
