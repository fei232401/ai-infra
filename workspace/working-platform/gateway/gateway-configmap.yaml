apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: ai-platform
  labels:
    app.kubernetes.io/part-of: gateway
data:
  gateway_config.yaml: |
    server:
      host: "0.0.0.0"
      port: 8000

    ollama:
      base_url: "http://ollama-service.ai-platform.svc.cluster.local:11434"
      default_model: "qwen2.5:1.5b"
      timeout: 120

    auth:
      enabled: false
      jwt_secret: "ai-infra-gateway-jwt-secret-key-2026"
      jwt_algorithm: "HS256"
      jwt_expire_minutes: 60
      api_keys:
        - "sk-infra-gateway-dev-key-2026"

    rate_limit:
      enabled: true
      capacity: 10
      refill_rate: 5

    circuit_breaker:
      enabled: true
      failure_threshold: 3
      timeout_seconds: 30
      half_open_requests: 1

    retry:
      enabled: true
      max_attempts: 2
      backoff_seconds: 1
