apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
  labels:
    name: nvidia-device-plugin-ds
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin-ctr
          image: nvcr.io/nvidia/k8s-device-plugin:v0.17.0
          args:
            - --pass-device-specs=true
          env:
            - name: DEVICE_DISCOVERY_STRATEGY
              value: "nvml"
            - name: LD_LIBRARY_PATH
              value: "/usr/lib/wsl/lib:/usr/lib/x86_64-linux-gnu"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
          securityContext:
            privileged: true
          volumeMounts:
            - name: dxg
              mountPath: /dev/dxg
            - name: wsl-lib
              mountPath: /usr/lib/wsl/lib
              readOnly: true
            - name: wsl-drivers
              mountPath: /usr/lib/wsl/drivers
              readOnly: true
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: dxg
          hostPath:
            path: /dev/dxg
            type: CharDevice
        - name: wsl-lib
          hostPath:
            path: /usr/lib/wsl/lib
            type: DirectoryOrCreate
        - name: wsl-drivers
          hostPath:
            path: /usr/lib/wsl/drivers
            type: DirectoryOrCreate
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
