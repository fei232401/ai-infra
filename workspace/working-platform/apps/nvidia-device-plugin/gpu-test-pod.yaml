apiVersion: v1
kind: Namespace
metadata:
  name: gpu-demo
  labels:
    app.kubernetes.io/managed-by: argocd
---
apiVersion: v1
kind: Pod
metadata:
  name: gpu-test
  namespace: gpu-demo
spec:
  runtimeClassName: nvidia
  restartPolicy: Never
  containers:
    - name: gpu-test
      image: nvidia/cuda:12.8.0-base-ubuntu22.04
      command: ["sleep", "3600"]
      env:
        - name: LD_LIBRARY_PATH
          value: "/usr/lib/wsl/lib:/usr/lib/x86_64-linux-gnu"
      resources:
        limits:
          nvidia.com/gpu: 1
      volumeMounts:
        - name: wsl-lib
          mountPath: /usr/lib/wsl/lib
          readOnly: true
        - name: wsl-drivers
          mountPath: /usr/lib/wsl/drivers
          readOnly: true
  volumes:
    - name: wsl-lib
      hostPath:
        path: /usr/lib/wsl/lib
        type: DirectoryOrCreate
    - name: wsl-drivers
      hostPath:
        path: /usr/lib/wsl/drivers
        type: DirectoryOrCreate
