apiVersion: v1
kind: Namespace
metadata:
  name: gpu-demo
  labels:
    app.kubernetes.io/managed-by: argocd
---
apiVersion: v1
kind: Pod
metadata:
  name: gpu-test
  namespace: gpu-demo
spec:
  restartPolicy: OnFailure
  containers:
    - name: gpu-test
      image: nvidia/cuda:12.8.0-base-ubuntu22.04
      command: ["nvidia-smi"]
      resources:
        limits:
          nvidia.com/gpu: 1
