---
# Source: kube-prometheus-stack/templates/prometheus/prometheus.yaml
apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: monitoring-stack-kube-prom-prometheus
  namespace: monitoring
  labels:
    app: kube-prometheus-stack-prometheus
    
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: monitoring-stack
    app.kubernetes.io/version: "65.3.1"
    app.kubernetes.io/part-of: kube-prometheus-stack
    chart: kube-prometheus-stack-65.3.1
    release: "monitoring-stack"
    heritage: "Helm"
spec:
  automountServiceAccountToken: true
  image: "quay.io/prometheus/prometheus:v2.54.1"
  version: v2.54.1
  externalUrl: http://localhost/prometheus
  paused: false
  replicas: 1
  shards: 1
  logLevel:  info
  logFormat:  logfmt
  listenLocal: false
  enableAdminAPI: false
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  retention: "2d"
  tsdb:
    outOfOrderTimeWindow: 0s
  walCompression: true
  routePrefix: /prometheus
  serviceAccountName: monitoring-stack-kube-prom-prometheus
  serviceMonitorSelector:
    matchLabels:
      release: "monitoring-stack"

  serviceMonitorNamespaceSelector: {}
  podMonitorSelector:
    matchLabels:
      release: "monitoring-stack"

  podMonitorNamespaceSelector: {}
  probeSelector:
    matchLabels:
      release: "monitoring-stack"

  probeNamespaceSelector: {}
  securityContext:
    fsGroup: 2000
    runAsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  ruleNamespaceSelector: {}
  ruleSelector:
    matchLabels:
      release: "monitoring-stack"

  scrapeConfigSelector:
    matchLabels:
      release: "monitoring-stack"

  scrapeConfigNamespaceSelector: {}
  storage:
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
        storageClassName: local-path
  portName: http-web
  hostNetwork: false

