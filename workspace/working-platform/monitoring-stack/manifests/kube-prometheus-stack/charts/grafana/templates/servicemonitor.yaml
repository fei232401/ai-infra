---
# Source: kube-prometheus-stack/charts/grafana/templates/servicemonitor.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: monitoring-stack-grafana
  namespace: monitoring
  labels:
    helm.sh/chart: grafana-8.5.5
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: monitoring-stack
    app.kubernetes.io/version: "11.2.2"
    app.kubernetes.io/managed-by: Helm
spec:
  endpoints:
  - port: http-web
    scrapeTimeout: 30s
    honorLabels: true
    path: /metrics
    scheme: http
  jobLabel: "monitoring-stack"
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: monitoring-stack
  namespaceSelector:
    matchNames:
      - monitoring

