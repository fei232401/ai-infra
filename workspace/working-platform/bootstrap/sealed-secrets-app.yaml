apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: sre-lab
    sre-lab.component: security
spec:
  project: default
  source:
    repoURL: 'git@github.com:fei232401/ai-infra.git'
    targetRevision: main
    path: workspace/working-platform/apps/sealed-secrets
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true