apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: sre-lab
    sre-lab.component: networking
spec:
  project: default
  source:
    repoURL: git@github.com:fei232401/ai-infra.git
    targetRevision: main
    path: workspace/working-platform/gateway
  destination:
    server: 'https://kubernetes.default.svc'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
