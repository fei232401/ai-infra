apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-device-plugin
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:fei232401/ai-infra.git
    targetRevision: HEAD
    path: workspace/working-platform/apps/nvidia-device-plugin
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
