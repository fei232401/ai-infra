apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-platform-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'git@github.com:fei232401/ai-infra.git'
    targetRevision: main
    path: workspace/working-platform/apps/ai-platform
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: ai-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
